version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/udyam_registration
      - PORT=5000
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - udyam-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=udyam_registration
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - udyam-network

  # Optional: Redis for caching (can be used for rate limiting)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - udyam-network

volumes:
  postgres_data:

networks:
  udyam-network:
    driver: bridge 